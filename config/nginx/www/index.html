<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackbeard</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f14;
            --surface: rgba(22, 26, 37, 0.82);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #c9a227;
            --accent2: #e8c547;
            --text: #e2e8f0;
            --text-muted: #8892a4;
            --radius: 14px;
            --panel-w: 220px;
            --collapsed: 64px;
            --transition: 0.28s cubic-bezier(.4, 0, .2, 1);
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* ── Snow ── */
        .snow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .snowflake {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            opacity: 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) translateX(var(--x-start, 0vw));
                opacity: 0;
            }

            10% {
                opacity: var(--max-op, 0.8);
            }

            90% {
                opacity: var(--max-op, 0.8);
            }

            100% {
                transform: translateY(100vh) translateX(var(--x-end, 5vw));
                opacity: 0;
            }
        }

        /* ── Hero ── */
        .hero {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
        }

        .skull {
            font-size: 72px;
            line-height: 1;
            filter: drop-shadow(0 0 24px rgba(201, 162, 39, 0.45));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .hero-title {
            font-size: clamp(2.4rem, 6vw, 4.2rem);
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 45%, #fff5cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 2px 18px rgba(201, 162, 39, 0.3));
        }

        .hero-sub {
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        /* ── Floating panel ── */
        .panel {
            position: fixed;
            left: 0;
            top: 16px;
            z-index: 100;
            width: var(--panel-w);
            background: var(--surface);
            backdrop-filter: blur(16px) saturate(1.6);
            -webkit-backdrop-filter: blur(16px) saturate(1.6);
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 var(--radius) var(--radius) 0;
            padding: 10px 0 10px 0;
            transition: width var(--transition), background var(--transition),
                border-color var(--transition), backdrop-filter var(--transition);
            overflow: hidden;
        }

        .panel.collapsed {
            width: var(--collapsed);
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-color: transparent;
            overflow: visible;
        }

        /* ── Toggle button ── */
        .toggle-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: 36px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--accent);
            font-size: 14px;
            padding: 0 18px;
            margin-bottom: 4px;
            transition: color 0.2s;
        }

        .toggle-btn:hover {
            color: var(--accent2);
        }

        /* When collapsed the button itself carries the visible hit-target */
        .panel.collapsed .toggle-btn {
            justify-content: center;
            padding: 0;
        }

        .toggle-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* ── Service list ── */
        .service-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 6px;
        }

        .service-item a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 9px 10px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.88rem;
            white-space: nowrap;
            overflow: hidden;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .service-item a:hover {
            background: rgba(201, 162, 39, 0.12);
            color: var(--accent2);
        }

        .svc-icon {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.04);
        }

        /* Fallback avatar for icons that fail to load */
        .svc-avatar {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
        }

        .svc-name {
            transition: opacity var(--transition), width var(--transition);
            opacity: 1;
        }

        .panel.collapsed .svc-name {
            opacity: 0;
            width: 0;
            pointer-events: none;
        }

        .panel.collapsed .service-list {
            padding: 0 8px;
        }

        .panel.collapsed .service-item a {
            justify-content: center;
            gap: 0;
            padding: 9px 0;
        }

        .panel.collapsed .service-item a:hover {
            background: rgba(201, 162, 39, 0.1);
            transform: translateX(1px) scale(1.02);
            box-shadow: 0 0 0 1px rgba(201, 162, 39, 0.22), 0 6px 14px rgba(0, 0, 0, 0.25);
        }

        /* ── Divider ── */
        .panel-divider {
            height: 1px;
            background: var(--border);
            margin: 6px 10px;
            transition: opacity var(--transition);
        }

        .panel.collapsed .panel-divider {
            opacity: 0;
        }
    </style>
</head>

<body>

    <!-- Snow background -->
    <div class="snow" id="snow"></div>

    <!-- Hero -->
    <main class="hero">
        <div class="skull">☠️</div>
        <h1 class="hero-title">Blackbeard</h1>
        <p class="hero-sub">Home Media Server</p>
    </main>

    <!-- Floating service menu -->
    <nav class="panel" id="panel" aria-label="Services">
        <button class="toggle-btn" id="toggleBtn" aria-label="Toggle menu" title="Toggle menu">
            <span class="toggle-icon" id="toggleIcon" aria-hidden="true"></span>
        </button>
        <div class="panel-divider"></div>
        <ul class="service-list" id="serviceList"></ul>
    </nav>

    <script>
        (function () {
            // ── Service definitions ──────────────────────────────────────────────
            var SERVICES = [
                { name: 'Jellyfin', port: 8096, color: '#00a4dc', icon: 'assets/jellyfin.png' },
                { name: 'Seerr', port: 5055, color: '#4f46e5', icon: 'assets/seerr.png' },
                { name: 'Sonarr', port: 8989, color: '#35c5f4', icon: 'assets/sonarr.png' },
                { name: 'Radarr', port: 7878, color: '#ffc230', icon: 'assets/radarr.png' },
                { name: 'qBittorrent', port: 5080, color: '#2f9ed3', icon: 'assets/qbittorrent.png' },
                { name: 'Prowlarr', port: 9696, color: '#ff7043', icon: 'assets/prowlarr.png' },
                { name: 'Bazarr', port: 6767, color: '#43a047', icon: 'assets/bazarr.png' },
            ];

            var host = window.location.hostname;

            // ── Build service list ───────────────────────────────────────────────
            var list = document.getElementById('serviceList');

            SERVICES.forEach(function (svc) {
                var url = 'http://' + host + ':' + svc.port;
                var init = svc.name.charAt(0);

                var li = document.createElement('li');
                li.className = 'service-item';

                var a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';

                // Icon — prefer the local asset for this service
                var img = document.createElement('img');
                img.className = 'svc-icon';
                img.alt = svc.name + ' icon';
                img.width = 30;
                img.height = 30;
                img.src = svc.icon;
                img.onerror = function () {
                    // Swap to a colored initial avatar
                    var av = document.createElement('span');
                    av.className = 'svc-avatar';
                    av.style.background = svc.color;
                    av.textContent = init;
                    av.setAttribute('aria-hidden', 'true');
                    img.parentNode && img.parentNode.replaceChild(av, img);
                };

                var span = document.createElement('span');
                span.className = 'svc-name';
                span.textContent = svc.name;

                a.appendChild(img);
                a.appendChild(span);
                li.appendChild(a);
                list.appendChild(li);
            });

            // ── Collapse / expand ────────────────────────────────────────────────
            var panel = document.getElementById('panel');
            var btn = document.getElementById('toggleBtn');
            var toggleIcon = document.getElementById('toggleIcon');
            var STORAGE_KEY = 'bb-menu-collapsed';

            function applyState(collapsed) {
                if (collapsed) {
                    panel.classList.add('collapsed');
                    btn.setAttribute('aria-expanded', 'false');
                    // Ícone de expandir (Hamburger)
                    toggleIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>';
                } else {
                    panel.classList.remove('collapsed');
                    btn.setAttribute('aria-expanded', 'true');
                    // Ícone de recolher (X)
                    toggleIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
                }
            }

            // Restore saved state
            applyState(localStorage.getItem(STORAGE_KEY) === '1');

            btn.addEventListener('click', function () {
                var isNowCollapsed = !panel.classList.contains('collapsed');
                applyState(isNowCollapsed);
                localStorage.setItem(STORAGE_KEY, isNowCollapsed ? '1' : '0');
            });

            // ── Snow ─────────────────────────────────────────────────────────────
            var container = document.getElementById('snow');
            var frag = document.createDocumentFragment();
            var numFlakes = 300;

            for (var i = 0; i < numFlakes; i++) {
                var s = document.createElement('div');
                s.className = 'snowflake';
                var size = Math.random() * 3 + 1;
                var startX = Math.random() * 100;
                var endX = startX + (Math.random() * 20 - 10);
                var duration = Math.random() * 8 + 5; // 5 to 13 seconds
                var delay = Math.random() * -15; // Start some off-screen

                s.style.cssText = [
                    'width:' + size + 'px',
                    'height:' + size + 'px',
                    'left:' + startX + '%',
                    'animation-duration:' + duration + 's',
                    'animation-delay:' + delay + 's',
                    '--max-op:' + (Math.random() * 0.4 + 0.3).toFixed(2),
                    '--x-start:' + (Math.random() * 20 - 10) + 'vw',
                    '--x-end:' + (Math.random() * 20 - 10) + 'vw',
                ].join(';');
                frag.appendChild(s);
            }
            container.appendChild(frag);
        })();
    </script>
</body>

</html>
